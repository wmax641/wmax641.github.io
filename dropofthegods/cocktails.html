<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocktail Recipes</title>
  <style>
    :root {
      --bg-1: #120f0b;
      --bg-2: #26160f;
      --panel: rgba(25, 18, 14, 0.82);
      --panel-border: rgba(255, 214, 168, 0.14);
      --text: #f3e9dc;
      --muted: #d9c1a5;
      --accent: #ff9f45;
      --accent-deep: #ff6d1f;
      --chip: rgba(255, 159, 69, 0.14);
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 159, 69, 0.18), transparent 32%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 2rem 1.25rem 3rem;
    }

    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav a.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #1a120c;
      font-weight: 700;
    }

    .hero {
      padding: 2rem;
      border-radius: 1.75rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: 0 24px 60px var(--shadow);
      margin-bottom: 1.5rem;
    }

    .eyebrow {
      margin: 0 0 0.6rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.78rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3.0 rem);
      line-height: 0.95;
    }

    .hero p {
      width: min(640px, 100%);
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .filters {
      display: grid;
      gap: 1rem;
      margin-bottom: 1.5rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 1.25rem;
      padding: 1rem 1.1rem;
      box-shadow: 0 18px 45px var(--shadow);
    }

    .filter-label {
      display: block;
      min-width: 70px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-line {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .filter-button {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.55rem 0.85rem;
      font: 0.5em;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .filter-button:focus-visible {
      outline: none;
    }

    .style-filter {
      color: var(--accent);
    }

    .style-filter:hover,
    .style-filter:focus-visible {
      border-color: rgba(255, 159, 69, 0.34);
      color: var(--accent);
    }

    .style-filter.active {
      background: var(--chip);
      border-color: rgba(255, 159, 69, 0.2);
      color: var(--accent);
    }

    .base-filter {
        color: #9fd0ff;
    }
    .base-filter:hover,
    .base-filter:focus-visible {
      border-color: rgba(120, 190, 255, 0.34);
      color: #9fd0ff;
    }

    .base-filter.active {
      background: rgba(120, 190, 255, 0.14);
      border-color: rgba(120, 190, 255, 0.2);
      color: #9fd0ff;
    }

    .section-filter {
      color: #b7f0bc;
    }

    .section-filter:hover,
    .section-filter:focus-visible {
      border-color: rgba(180, 255, 184, 0.34);
      color: #b7f0bc;
    }

    .section-filter.active {
      background: rgba(180, 255, 184, 0.14);
      border-color: rgba(180, 255, 184, 0.2);
      color: #b7f0bc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 1.4rem;
      padding: 1.4rem;
      box-shadow: 0 18px 45px var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .image-wrap {
      position: relative;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: block;
    }

    .image-title {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 4.0rem 1rem 1rem;
      border-radius: 0 0 1rem 1rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0.0));
      font-size: 1.8rem;
      line-height: 1.1;
    }

    .title-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .title-row.has-note {
      cursor: help;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card h2 {
      margin: 0;
      font-size: 1.8rem;
    }

    .note-badge {
      flex: 0 0 auto;
      font-size: 1.4rem;
      line-height: 1;
    }

    .title-note-tooltip {
      position: absolute;
      left: 0;
      bottom: calc(100% + 0.65rem);
      min-width: 150px;
      max-width: 220px;
      padding: 0.55rem 0.7rem;
      border-radius: 0.75rem;
      background: rgba(8, 8, 8, 0.92);
      color: #f6f0e8;
      font-size: 0.8rem;
      line-height: 1.4;
      white-space: normal;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      transform: translateY(0.2rem);
      z-index: 3;
    }

    .title-note-arrow {
      position: absolute;
      left: 0.45rem;
      bottom: calc(100% + 0.3rem);
      border-width: 0.35rem;
      border-style: solid;
      border-color: rgba(8, 8, 8, 0.92) transparent transparent transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      transform: translateY(0.2rem);
      z-index: 3;
    }

    .title-row.has-note:hover .title-note-tooltip,
    .title-row.has-note:hover .title-note-arrow,
    .title-row.has-note:focus-visible .title-note-tooltip,
    .title-row.has-note:focus-visible .title-note-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      position: relative;
      white-space: nowrap;
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: help;
    }

    .chip::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 0.65rem);
      transform: translateX(-50%) translateY(0.2rem);
      min-width: 150px;
      max-width: 220px;
      padding: 0.55rem 0.7rem;
      border-radius: 0.75rem;
      background: rgba(8, 8, 8, 0.92);
      color: #f6f0e8;
      text-transform: none;
      letter-spacing: normal;
      font-size: 0.8rem;
      line-height: 1.4;
      white-space: normal;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 2;
    }

    .chip::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: calc(100% + 0.3rem);
      transform: translateX(-50%) translateY(0.2rem);
      border-width: 0.35rem;
      border-style: solid;
      border-color: rgba(8, 8, 8, 0.92) transparent transparent transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 2;
    }

    .chip:hover::after,
    .chip:hover::before,
    .chip:focus-visible::after,
    .chip:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .style-chip {
      background: var(--chip);
      color: var(--accent);
    }

    .base-chip {
      background: rgba(120, 190, 255, 0.14);
      color: #9fd0ff;
    }

    .section-chip {
      background: rgba(180, 255, 184, 0.14);
      color: #b7f0bc;
    }

    .section-title {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    li,
    .method {
      color: var(--muted);
      line-height: 1.55;
    }

    ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .footer-note {
      margin-top: 1.5rem;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .status {
      padding: 1rem 1.2rem;
      border-radius: 1rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      box-shadow: 0 18px 45px var(--shadow);
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem 0.8rem 2rem;
      }

      .filter-line {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.6rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .card {
        padding: 1.1rem;
      }

      .card-header {
        flex-direction: column;
      }

    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="nav" aria-label="Site navigation">
      <a href="./brix.html">Brix Calculator</a>
      <a href="./cocktails.html" class="active">Cocktail Recipes</a>
    </nav>

    <section class="hero">
      <p class="eyebrow">dropofthegods</p>
      <h1>Cocktail Recipes</h1>
    </section>

    <section class="filters" id="filters" aria-label="Recipe filters"></section>

    <section class="grid" id="recipeGrid" aria-label="Cocktail recipes">
      <div class="status">Loading recipes...</div>
    </section>

    <p class="footer-note">
      Brought to you by <code>dropofthegods</code>
    </p>
  </main>

  <script>
    const filtersRoot = document.getElementById("filters");
    const recipeGrid = document.getElementById("recipeGrid");
    const filterState = {
      style: null,
      base: null,
      section: null
    };
    let allRecipes = [];

    function formatAmount(value) {
      return Number.isInteger(value) ? String(value) : String(value).replace(/\.0$/, "");
    }

    function renderMethod(method) {
      if (Array.isArray(method)) {
        return method.map((step) => `<p>${step}</p>`).join("");
      }

      return method ?? "";
    }

    function renderIngredient(item) {
      if (typeof item === "string") {
        return item;
      }

      return `${formatAmount(item.amount)} ${item.unit} ${item.ingredient}`;
    }

    function renderTitle(recipe, className = "") {
      const classes = `title-row${recipe.notes ? " has-note" : ""}${className ? ` ${className}` : ""}`;
      const noteAttrs = recipe.notes ? ` tabindex="0" aria-label="${recipe.name}. Note available."` : "";

      return `
        <div class="${classes}"${noteAttrs}>
          <h2>${recipe.name}</h2>
          ${recipe.notes ? `<span class="note-badge" aria-hidden="true">🗒️</span>` : ""}
          ${recipe.notes ? `<span class="title-note-tooltip" role="tooltip">${recipe.notes}</span><span class="title-note-arrow" aria-hidden="true"></span>` : ""}
        </div>
      `;
    }

    function getUniqueValues(recipes, key) {
      return [...new Set(recipes.map((recipe) => recipe[key]).filter(Boolean))];
    }

    function createFilterGroup(label, key, values) {
      return `
        <div class="filter-line">
          <span class="filter-label">${label}</span>
          <div class="filter-row">
            ${values.map((value) => `
              <button
                type="button"
                class="filter-button ${key}-filter ${filterState[key] === value ? "active" : ""}"
                data-filter-key="${key}"
                data-filter-value="${value}"
                aria-pressed="${filterState[key] === value ? "true" : "false"}"
              >
                ${value}
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderFilters(recipes) {
      filtersRoot.innerHTML = [
        createFilterGroup("Style", "style", getUniqueValues(recipes, "style")),
        createFilterGroup("Base", "base", getUniqueValues(recipes, "base")),
        createFilterGroup("Section", "section", getUniqueValues(recipes, "section"))
      ].join("");
    }

    function getFilteredRecipes() {
      return allRecipes.filter((recipe) => {
        return ["style", "base", "section"].every((key) => {
          return filterState[key] === null || recipe[key] === filterState[key];
        });
      });
    }

    function renderRecipes(recipes) {
      if (!recipes.length) {
        recipeGrid.innerHTML = `<div class="status">No recipes match the current filters.</div>`;
        return;
      }

      recipeGrid.innerHTML = recipes.map((recipe) => `
        <article class="card">
          ${recipe.img ? `
            <div class="image-wrap">
              <img class="card-image" src="${recipe.img}" alt="${recipe.name}">
              <div class="image-title">${renderTitle(recipe)}</div>
            </div>
          ` : ""}
          <div class="card-header">
            ${recipe.img ? "" : renderTitle(recipe)}
            <div class="chip-row">
              ${recipe.style ? `<span class="chip style-chip" tabindex="0" data-tooltip="The foundational cocktail class">${recipe.style}</span>` : ""}
              ${recipe.base ? `<span class="chip base-chip" tabindex="0" data-tooltip="The primary base liqueur">${recipe.base}</span>` : ""}
              ${recipe.section ? `<span class="chip section-chip" tabindex="0" data-tooltip="Category">${recipe.section}</span>` : ""}
            </div>
          </div>
          <div>
            <span class="section-title">Ingredients</span>
            <ul>${recipe.ingredients.map((item) => `<li>${renderIngredient(item)}</li>`).join("")}</ul>
          </div>
          <div>
            <span class="section-title">Method</span>
            <div class="method">${renderMethod(recipe.method)}</div>
          </div>
        </article>
      `).join("");
    }

    function updateView() {
      renderFilters(allRecipes);
      renderRecipes(getFilteredRecipes());
    }

    filtersRoot.addEventListener("click", (event) => {
      const button = event.target.closest(".filter-button");
      if (!button) {
        return;
      }

      const { filterKey, filterValue } = button.dataset;
      filterState[filterKey] = filterState[filterKey] === filterValue ? null : filterValue;
      updateView();
    });

    async function loadRecipes() {
      try {
        const response = await fetch("./cocktails.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        allRecipes = await response.json();
        updateView();
      } catch (error) {
        filtersRoot.innerHTML = "";
        recipeGrid.innerHTML = `
          <div class="status">
            Unable to load recipes from <code>cocktails.json</code>.
          </div>
        `;
      }
    }

    loadRecipes();
  </script>
</body>
</html>
